<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Banner: Algeria Administrative Mapping</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Caveat:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .banner-container {
            width: 100%;
            height: 500px;
            background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 50%, #fef2f2 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 80px;
            position: relative;
            box-sizing: border-box;
        }

        .mesh {
            position: absolute;
            width: 800px;
            height: 800px;
            filter: blur(100px);
            opacity: 0.2;
            z-index: 1;
            pointer-events: none;
        }

        .mesh-1 {
            background: radial-gradient(circle, #008751 0%, transparent 70%);
            top: -400px;
            left: -200px;
        }

        .mesh-2 {
            background: radial-gradient(circle, #d21034 0%, transparent 70%);
            bottom: -400px;
            right: -200px;
        }

        .decoration-text {
            position: absolute;
            bottom: 20px;
            right: 40px;
            font-size: 160px;
            font-weight: 900;
            color: rgba(0,0,0,0.03);
            z-index: 0;
            letter-spacing: -5px;
            user-select: none;
        }

        .content {
            position: relative;
            z-index: 10;
            max-width: 650px;
        }

        h1 {
            font-size: 72px;
            font-weight: 800;
            color: #111827;
            line-height: 1;
            letter-spacing: -3px;
            margin: 0;
        }

        .subtitle {
            font-family: 'Caveat', cursive;
            font-size: 42px;
            color: #008751;
            margin: 15px 0 0 0;
        }

        .visual-container {
            position: relative;
            z-index: 10;
        }

        .visual-container img {
            width: 400px;
            height: 400px;
            border-radius: 60px;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.12));
            transform: rotate(-3deg);
        }

        .badge-dz {
            background: #d21034;
            color: white;
            padding: 10px 20px;
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 15px 30px rgba(210, 16, 52, 0.2);
            margin-top: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .flag-icon {
            height: 24px;
            border-radius: 2px;
        }

    </style>
</head>
<body>
    <div class="banner-container">
        <div class="mesh mesh-1"></div>
        <div class="mesh mesh-2"></div>
        <div class="decoration-text">ALGERIA</div>
        
        <div class="content">
            <!-- Company Branding -->
            <div style="margin-bottom: 30px;">
                <img src="logo_full_taghrasthink.png" style="height: 70px;" alt="TaghrasThink">
            </div>

            <!-- Header -->
            <h1>Algeria:<br>Administrative Mapping</h1>
            <p class="subtitle">69 Wilayas & 1541 Municipalities</p>
            
            <div class="badge-dz">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/77/Flag_of_Algeria.svg" class="flag-icon" alt="DZ">
                ✓ NOVEMBER 2025 COMPLIANT
            </div>
        </div>

        <div class="visual-container">
            <img src="icon.png" alt="Dz State">
        </div>
    </div>
</body>
</html>
