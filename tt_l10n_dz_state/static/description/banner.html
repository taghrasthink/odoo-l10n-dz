<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odoo Apps Banner - Algérie : Découpage Administratif</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Caveat:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --odoo-purple: #714B67;
            --odoo-teal: #00A09D;
            --odoo-dark: #111827;
            --odoo-grey: #4B5563;
            --bg-light: #F9FAFB;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .banner-container {
            width: 1280px;
            height: 640px;
            background: #ffffff;
            position: relative;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 0 80px;
            box-sizing: border-box;
        }

        /* Mesh Gradients */
        .mesh {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            z-index: 1;
        }

        .mesh-1 {
            top: -200px;
            right: -200px;
            background: var(--odoo-teal);
        }

        .mesh-2 {
            bottom: -200px;
            left: -200px;
            background: var(--odoo-purple);
        }

        .content {
            position: relative;
            z-index: 10;
            max-width: 600px;
        }

        .flag-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .flag {
            width: 48px;
            height: 32px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .brand {
            font-weight: 700;
            color: var(--odoo-grey);
            font-size: 18px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 56px;
            font-weight: 800;
            color: var(--odoo-dark);
            line-height: 1.1;
            margin: 0 0 16px 0;
            letter-spacing: -2px;
        }

        .subtitle {
            font-family: 'Caveat', cursive;
            font-size: 42px;
            color: var(--odoo-teal);
            margin: 0;
            display: inline-block;
            position: relative;
        }

        .subtitle::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 8px;
            background: url('https://odoo-community.org/website/image/ir.attachment/3277732_164cc82/datas') no-repeat center;
            /* Approximation underline */
            background-size: contain;
            opacity: 0.3;
        }

        .badge-2025 {
            margin-top: 40px;
            background: var(--odoo-purple);
            color: white;
            padding: 8px 16px;
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 10px 20px rgba(113, 75, 103, 0.2);
        }

        .map-container {
            position: absolute;
            right: 0;
            top: 20px;
            bottom: 20px;
            width: 600px;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .map-svg {
            width: 100%;
            height: 100%;
            fill: #E5E7EB;
            opacity: 0.8;
            transition: all 0.5s ease;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.05));
        }

        .map-svg:hover {
            fill: var(--odoo-teal);
            opacity: 1;
        }

        .decoration-text {
            position: absolute;
            font-size: 200px;
            font-weight: 900;
            color: #F3F4F6;
            z-index: 0;
            bottom: -40px;
            right: 40px;
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="banner-container">
        <div class="mesh mesh-1"></div>
        <div class="mesh mesh-2"></div>
        <div class="decoration-text">DZ</div>
        
        <!-- Logo Watermark Maximisé -->
        <div style="position: absolute; top: 10%; left: 0%; width: 1100px; opacity: 0.07; z-index: 0; pointer-events: none; transform: rotate(-8deg);">
            <img src="logo_full_taghrasthink.png" style="width: 100%; height: auto;">
        </div>

        <div class="content">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/77/Flag_of_Algeria.svg"
                 style="height: 70px; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); margin-bottom: 30px; display: block;"
                 alt="Algérie" />

            <h1>Algérie :<br>Découpage Administratif</h1>
            <p class="subtitle">69 Wilayas & 1541 Communes</p>
            <div class="badge-2025">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                RÉFORME NOVEMBRE 2025
            </div>
        </div>

        <div class="map-container">
            <img src="icon.png"
                style="width: 400px; height: 400px; border-radius: 60px; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15));">
        </div>
    </div>
</body>

</html>
